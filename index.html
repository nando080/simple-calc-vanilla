<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/calculator.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Calculadora</title>
</head>
<body class="dark">
    <main class="calc dark">
        <section class="display">
            <div class="history-display dark initial-state">0</div>
            <div class="value-display dark">0</div>
            <div class="error">E</div>
            <!-- 0000000000000000 -->
        </section>
        <section class="keyboard">
            <button class="operation" data-js="operation" data-value="divide">/</button>
            <button class="operation" data-js="operation" data-value="multiply">x</button>
            <button class="operation" data-js="operation" data-value="subtract">-</button>
            <button class="operation" data-js="operation" data-value="sum">+</button>
            <button class="operation" data-js="clear">C</button>
            <button class="operation" data-js="clear-all">CE</button>
            <button class="operation" data-js="negative">&#xb1;</button>
            <button class="operation" data-js="equals">=</button>
            <button class="number dark" data-js="dot">.</button>
            <button class="number dark" data-js="number" data-value="7">7</button>
            <button class="number dark" data-js="number" data-value="8">8</button>
            <button class="number dark" data-js="number" data-value="9">9</button>
            <button class="number dark" data-js="number" data-value="4">4</button>
            <button class="number dark" data-js="number" data-value="5">5</button>
            <button class="number dark" data-js="number" data-value="6">6</button>
            <button class="number dark" data-js="number" data-value="1">1</button>
            <button class="number dark" data-js="number" data-value="2">2</button>
            <button class="number dark" data-js="number" data-value="3">3</button>
            <button class="number dark" data-js="number" data-value="0">0</button>
        </section>
    </main>
    <div class="theme-toggle-container dark">
        <div class="toggle-button dark">
            <img src="img/moonicon.svg" alt="change theme">
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
